<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AHA Rx — Recetas m\u00e9dicas offline para consultorios">
  <meta name="theme-color" content="#059669">
  <title>AHA Rx</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='68' font-size='50' fill='white' text-anchor='middle' font-family='system-ui'%3ERx%3C/text%3E%3C/svg%3E">

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <style>
    /* Ajustes de tema AHA Rx */
    :root {
      --p: #059669;
      --pf: #047857;
      --pc: #ffffff;
      --s: #047857;
      --sf: #065f46;
      --sc: #ffffff;
      --a: #34d399;
      --af: #10b981;
      --ac: #064e3b;
      --n: #1f2937;
      --nf: #111827;
      --nc: #f3f4f6;
      --b1: #ffffff;
      --b2: #f3f4f6;
      --b3: #d1d5db;
      --bc: #1f2937;
      --rounded-box: 1rem;
      --rounded-btn: 0.5rem;
      --rounded-badge: 2rem;
      --animation-btn: 0.25s;
      --animation-input: 0.2s;
      --btn-focus-scale: 0.95;
      --tab-radius: 0.5rem;
    }
    [data-theme="dark"] {
      --b1: #1f2937;
      --b2: #374151;
      --b3: #4b5563;
      --bc: #f3f4f6;
    }

    /* Layout */
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .app-shell {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      transition: transform 0.3s ease;
    }
    .sidebar.collapsed {
      transform: translateX(-100%);
    }

    /* Main content area */
    .main-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .content-wrapper {
      flex: 1;
      padding: 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* Bottom nav (mobile) */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: var(--b1);
      border-top: 1px solid var(--b3);
      padding: 0.25rem 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      color: var(--bc);
      opacity: 0.6;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .bottom-nav a.active,
    .bottom-nav a:hover {
      opacity: 1;
      color: var(--p);
    }
    .bottom-nav a i {
      font-size: 1.25rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 49;
      }
      .sidebar-backdrop.show {
        display: block;
      }
      .bottom-nav {
        display: flex;
      }
      .content-wrapper {
        padding: 1rem;
        padding-bottom: 4.5rem;
      }
      .main-area {
        padding-top: 0;
      }
    }
    @media (min-width: 769px) {
      .mobile-only { display: none !important; }
      .desktop-only { display: flex !important; }
    }
    @media (max-width: 768px) {
      .desktop-only { display: none !important; }
    }

    /* Scrollbar */
    .main-area::-webkit-scrollbar { width: 6px; }
    .main-area::-webkit-scrollbar-track { background: transparent; }
    .main-area::-webkit-scrollbar-thumb { background: var(--b3); border-radius: 3px; }

    /* Skeleton shimmer */
    .skeleton {
      background: linear-gradient(90deg, var(--b2) 25%, var(--b3) 50%, var(--b2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.5rem;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Transiciones de m\u00f3dulo */
    .module-enter {
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Utilidades para recetas PDF preview */
    .receta-preview {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .receta-preview h1 { font-size: 18px; font-weight: bold; text-align: center; }
    .receta-preview .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 12px; }
    .receta-preview .rx-body { min-height: 200px; }
    .receta-preview .rx-line { border-bottom: 1px dashed #999; margin: 8px 0; }
    .receta-preview .firma { margin-top: 30px; text-align: center; border-top: 1px solid #000; padding-top: 4px; width: 200px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-base-300/50 backdrop-blur-sm z-[60] flex items-center justify-center">
    <div class="flex flex-col items-center gap-3">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <p class="text-sm text-base-content/60">Cargando...</p>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast toast-top toast-end z-[100]"></div>

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- ==================== APP SHELL ==================== -->
  <div class="app-shell">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar bg-base-200 border-r border-base-300 flex flex-col">
      <!-- Logo -->
      <div class="p-4 border-b border-base-300 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-bold text-lg">Rx</div>
        <div>
          <h1 class="font-bold text-base">AHA Rx</h1>
          <p class="text-xs text-base-content/50">Recetas m\u00e9dicas</p>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-y-auto p-3 space-y-1">
        <script>
          var modulos = APP_CONFIG.modulos;
          for (var key in modulos) {
            if (modulos.hasOwnProperty(key) && modulos[key].activo) {
              var m = modulos[key];
              var active = (window.location.hash.replace('#','') || 'pacientes') === key ? ' active' : '';
              document.write('<a href="#' + key + '" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-base-300 transition-colors sidebar-link' + active + '">');
              document.write('<i class="' + m.icono + ' text-lg w-5 text-center"></i>');
              document.write('<span class="text-sm font-medium">' + m.titulo + '</span>');
              document.write('</a>');
            }
          }
        </script>
      </nav>

      <!-- Footer -->
      <div class="p-3 border-t border-base-300 text-center text-xs text-base-content/40">
        v1.0.0 &mdash; Plan Lite
      </div>
    </aside>

    <!-- Main area -->
    <div class="main-area">
      <!-- Top navbar -->
      <header class="bg-base-100 border-b border-base-300 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button class="btn btn-ghost btn-sm btn-square desktop-only" onclick="toggleSidebar()">
            <i class="bi bi-list text-xl"></i>
          </button>
          <button class="btn btn-ghost btn-sm btn-square mobile-only" onclick="toggleSidebar()">
            <i class="bi bi-list text-xl"></i>
          </button>
          <h2 id="page-title" class="font-semibold text-lg">Pacientes</h2>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost btn-sm btn-square" onclick="document.querySelector('[x-data]')?.__x.$data?.openPalette()" title="Buscar (Ctrl+K)">
            <i class="bi bi-search text-lg"></i>
          </button>
          <!-- Network status -->
          <span x-data x-init="$store.network = { online: navigator.onLine }" x-on:connection-change.window="$store.network.online = $event.detail.online" class="badge gap-1" x-bind:class="$store.network.online ? 'badge-success' : 'badge-error'">
            <i x-bind:class="$store.network.online ? 'bi-wifi' : 'bi-wifi-off'"></i>
            <span x-text="$store.network.online ? 'En l\u00ednea' : 'Sin conexi\u00f3n'" class="hidden sm:inline"></span>
          </span>
        </div>
      </header>

      <!-- Content -->
      <div class="content-wrapper" id="main-content">
        <!-- Loading skeleton (shown while module loads) -->
        <div id="loading-skeleton" class="space-y-4">
          <div class="skeleton h-8 w-48"></div>
          <div class="flex gap-2">
            <div class="skeleton h-10 w-32"></div>
            <div class="skeleton h-10 w-64"></div>
          </div>
          <div class="skeleton h-12 w-full"></div>
          <div class="skeleton h-12 w-full"></div>
          <div class="skeleton h-12 w-full"></div>
          <div class="skeleton h-12 w-full"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <script>
      var mods = APP_CONFIG.modulos;
      for (var k in mods) {
        if (mods.hasOwnProperty(k) && mods[k].activo) {
          var m2 = mods[k];
          var a2 = (window.location.hash.replace('#','') || 'pacientes') === k ? ' active' : '';
          document.write('<a href="#' + k + '" class="bottom-nav-link' + a2 + '">');
          document.write('<i class="' + m2.icono + '"></i>');
          document.write('<span>' + m2.titulo + '</span>');
          document.write('</a>');
        }
      }
    </script>
  </nav>

  <!-- ==================== SEARCH PALETTE ==================== -->
  <div x-data="searchPalette()" @keydown.window.cmd.k.prevent="openPalette()" @keydown.window.ctrl.k.prevent="openPalette()" @keydown.window="onKeydown">
    <template x-teleport="body">
      <div x-show="open" x-cloak class="fixed inset-0 z-[60] flex items-start justify-center pt-[12vh]" @click.away="closePalette">
        <div class="absolute inset-0 bg-base-300/60 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-xl">
          <div class="bg-base-100 rounded-2xl shadow-2xl border border-base-300 overflow-hidden">
            <!-- Input -->
            <div class="flex items-center gap-3 px-5 py-4 border-b border-base-200">
              <svg class="w-5 h-5 text-base-content/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input x-model="query" type="text" class="sp-search-input flex-1 bg-transparent border-0 outline-none text-base placeholder:text-base-content/30" placeholder="Buscar m\u00f3dulos...">
              <kbd class="hidden sm:inline-flex px-2 py-0.5 text-xs rounded bg-base-200 text-base-content/50">ESC</kbd>
            </div>
            <!-- Results -->
            <div class="max-h-80 overflow-y-auto p-2">
              <template x-if="!hasResults && query.length >= 2">
                <div class="px-3 py-8 text-center text-sm text-base-content/40">
                  <svg class="w-8 h-8 mx-auto mb-2 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  Sin resultados para "<span x-text="query"></span>"
                </div>
              </template>
              <template x-if="!query">
                <div class="px-3 py-2 text-xs font-semibold text-base-content/40 uppercase tracking-wider">M\u00f3dulos</div>
              </template>
              <template x-for="(item, i) in filtered" :key="i">
                <div @click="selectItem(item)" @mouseenter="keyboardNav = false"
                     :class="{'bg-primary/10 text-primary': keyboardNav && selectedIdx === i, 'hover:bg-base-200': !(keyboardNav && selectedIdx === i)}"
                     class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer transition-colors">
                  <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-base-200 text-base-content/60 shrink-0">
                    <i :class="item.icon" class="text-sm"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium truncate" x-text="item.title"></div>
                  </div>
                  <span class="badge badge-ghost badge-sm">m\u00f3dulo</span>
                </div>
              </template>
            </div>
            <!-- Footer -->
            <div class="flex items-center gap-4 px-5 py-2.5 border-t border-base-200 text-xs text-base-content/40">
              <span class="flex items-center gap-1"><kbd class="kbd kbd-xs">\u2191\u2193</kbd> Navegar</span>
              <span class="flex items-center gap-1"><kbd class="kbd kbd-xs">\u21b5</kbd> Abrir</span>
              <span class="flex items-center gap-1"><kbd class="kbd kbd-xs">Esc</kbd> Cerrar</span>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- ==================== LIBRER\u00cdAS JS ==================== -->

  <!-- Libs base -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.7/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

  <!-- Librer\u00edas adicionales (desde spec) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- FIN librer\u00edas adicionales -->

  <!-- Core -->
  <script src="core/env.js"></script>
  <script src="core/db.js"></script>
  <script src="core/crypto.js"></script>
  <script src="core/ui.js"></script>
  <script src="core/theme.js"></script>
  <script src="core/app.js"></script>
  <script src="core/search-palette.js"></script>
  <script src="core/file-store.js"></script>
  <script src="core/sync.js"></script>
  <script src="core/license.js"></script>
  <script src="core/network.js"></script>

  <!-- Main -->
  <script src="core/main.js"></script>

  <script>
    // Toggle sidebar
    function toggleSidebar() {
      var s = document.getElementById('sidebar');
      var b = document.getElementById('sidebar-backdrop');
      if (window.innerWidth <= 768) {
        s.classList.toggle('open');
        b.classList.toggle('show');
      } else {
        s.classList.toggle('collapsed');
      }
    }

    // Active nav link highlighting
    window.addEventListener('hashchange', function () {
      var hash = window.location.hash.replace('#', '') || 'pacientes';
      document.querySelectorAll('.sidebar-link, .bottom-nav-link').forEach(function (el) {
        el.classList.toggle('active', el.getAttribute('href') === '#' + hash);
      });
      var mod = APP_CONFIG.modulos[hash];
      var titleEl = document.getElementById('page-title');
      if (mod && titleEl) titleEl.textContent = mod.titulo;
    });
  </script>
</body>
</html>
