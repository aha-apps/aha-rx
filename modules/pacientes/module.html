<!-- module.html — Pacientes -->
<div x-data="pacientesData()" x-init="init()" class="module-enter">
  <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
    <i class="bi bi-people"></i> Pacientes
  </h2>

  <!-- Toolbar -->
  <div class="flex flex-wrap gap-2 mb-4">
    <button class="btn btn-primary" @click="abrirForm()">
      <i class="bi bi-plus-lg"></i> Agregar
    </button>
    <input type="search" x-model="busqueda" placeholder="Buscar paciente..."
           class="input input-bordered flex-1 min-w-[200px]" />
    <button class="btn btn-ghost" @click="SeedData.sembrar()">
      <i class="bi bi-database"></i> Seed
    </button>
  </div>

  <!-- Lista -->
  <template x-if="items.length && items.length > 0">
    <div class="overflow-x-auto">
      <table class="table table-zebra">
        <thead>
          <tr>
            <th>Nombre</th>
            <th class="hidden sm:table-cell">Tel\u00e9fono</th>
            <th class="hidden md:table-cell">Direcci\u00f3n</th>
            <th class="hidden md:table-cell">Nacimiento</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="item in filtered" :key="item.id">
            <tr>
              <td>
                <div class="font-medium" x-text="item.nombre"></div>
                <div x-show="item.alergias" class="text-xs text-error flex items-center gap-1 mt-0.5">
                  <i class="bi bi-exclamation-triangle-fill"></i>
                  <span x-text="'Alergias: ' + item.alergias"></span>
                </div>
              </td>
              <td class="hidden sm:table-cell" x-text="item.telefono"></td>
              <td class="hidden md:table-cell" x-text="item.direccion"></td>
              <td class="hidden md:table-cell"><span x-text="UI.formatDate(item.fechaNacimiento)"></span></td>
              <td>
                <div class="flex gap-1">
                  <button class="btn btn-sm btn-ghost" @click="verHistorial(item.id)" title="Ver historial">
                    <i class="bi bi-clock-history"></i>
                  </button>
                  <button class="btn btn-sm btn-ghost" @click="abrirForm(item)" title="Editar">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-ghost text-error" @click="eliminar(item)" title="Eliminar">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <!-- Empty state -->
  <template x-if="(!items || items.length === 0) && !cargando">
    <div class="flex flex-col items-center justify-center py-16 text-base-content/50">
      <i class="bi bi-people text-6xl mb-4"></i>
      <p class="text-lg mb-4">No hay pacientes registrados</p>
      <button class="btn btn-primary" @click="abrirForm()">
        <i class="bi bi-plus-lg"></i> Agregar primer paciente
      </button>
    </div>
  </template>

  <!-- Loading skeleton -->
  <template x-if="cargando">
    <div class="space-y-3">
      <div class="skeleton h-12 w-full"></div>
      <div class="skeleton h-12 w-full"></div>
      <div class="skeleton h-12 w-full"></div>
    </div>
  </template>
</div>

<script>
  function pacientesData() {
    var mod = window.MODULES['pacientes'];
    return {
      items: [],
      busqueda: '',
      cargando: true,

      get filtered() {
        var self = this;
        if (!this.busqueda) return this.items;
        var q = this.busqueda.toLowerCase();
        return this.items.filter(function (p) {
          return (p.nombre && p.nombre.toLowerCase().indexOf(q) !== -1) ||
                 (p.telefono && p.telefono.indexOf(q) !== -1);
        });
      },

      init: function () {
        var self = this;
        this.cargando = true;
        db.pacientes.orderBy('nombre').toArray().then(function (data) {
          self.items = data;
          self.cargando = false;
        });
        // Vincular al m\u00f3dulo para que cargarDatos actualice
        mod.cargarDatos = function () {
          db.pacientes.orderBy('nombre').toArray().then(function (data) {
            self.items = data;
          });
        };
      },

      abrirForm: function (item) {
        mod.abrirForm(item);
      },

      eliminar: function (item) {
        mod.eliminar(item);
      },

      verHistorial: function (pacienteId) {
        mod.verHistorial(pacienteId);
      }
    };
  }
</script>
