<!-- module.html — Recetas -->
<div x-data="recetasData()" x-init="init()" class="module-enter">
  <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
    <i class="bi bi-file-earmark-text"></i> Recetas
  </h2>

  <!-- Toolbar -->
  <div class="flex flex-wrap gap-2 mb-4">
    <button class="btn btn-primary" @click="abrirForm()">
      <i class="bi bi-plus-lg"></i> Nueva Receta
    </button>
    <input type="search" x-model="busqueda" placeholder="Buscar por paciente o diagn\u00f3stico..."
           class="input input-bordered flex-1 min-w-[200px]" />
  </div>

  <!-- Lista -->
  <template x-if="items.length">
    <div class="overflow-x-auto">
      <table class="table table-zebra">
        <thead>
          <tr>
            <th>Paciente</th>
            <th class="hidden sm:table-cell">Diagn\u00f3stico</th>
            <th class="hidden md:table-cell">Fecha</th>
            <th class="hidden md:table-cell">Pr\u00f3x. Cita</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="item in filtered" :key="item.id">
            <tr>
              <td>
                <div class="font-medium" x-text="getNombrePaciente(item.pacienteId)"></div>
              </td>
              <td class="hidden sm:table-cell">
                <span class="badge badge-ghost" x-text="descifrarDiag(item.diagnostico)"></span>
              </td>
              <td class="hidden md:table-cell text-sm" x-text="UI.formatDate(item.createdAt)"></td>
              <td class="hidden md:table-cell text-sm" x-text="item.proximaCita ? UI.formatDate(item.proximaCita) : '--'"></td>
              <td>
                <div class="flex gap-1">
                  <button class="btn btn-sm btn-ghost text-primary" @click="generarPDF(item)" title="PDF">
                    <i class="bi bi-file-earmark-pdf"></i>
                  </button>
                  <button class="btn btn-sm btn-ghost" @click="abrirForm(item)" title="Editar">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-ghost text-error" @click="eliminar(item)" title="Eliminar">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <!-- Vac\u00edo -->
  <template x-if="!items.length && !cargando">
    <div class="flex flex-col items-center justify-center py-16 text-base-content/50">
      <i class="bi bi-file-earmark-text text-6xl mb-4"></i>
      <p class="text-lg mb-4">No hay recetas registradas</p>
      <button class="btn btn-primary" @click="abrirForm()">
        <i class="bi bi-plus-lg"></i> Crear primera receta
      </button>
    </div>
  </template>

  <!-- Loading skeleton -->
  <template x-if="cargando">
    <div class="space-y-3">
      <div class="skeleton h-12 w-full"></div>
      <div class="skeleton h-12 w-full"></div>
      <div class="skeleton h-12 w-full"></div>
    </div>
  </template>
</div>

<script>
  function recetasData() {
    var mod = window.MODULES['recetas'];
    return {
      items: [],
      busqueda: '',
      cargando: true,
      pacientes: [],
      medicamentos: [],

      get filtered() {
        var self = this;
        if (!this.busqueda) return this.items;
        var q = this.busqueda.toLowerCase();
        return this.items.filter(function (r) {
          var diagRaw = r.diagnostico || '';
          var diag = diagRaw;
          if (diagRaw.indexOf('U2FsdGVkX1') === 0) {
            diag = cryptoHelpers.decrypt(diagRaw) || diagRaw;
          }
          var pName = (mod.getNombrePaciente(r.pacienteId) || '').toLowerCase();
          return diag.toLowerCase().indexOf(q) !== -1 || pName.indexOf(q) !== -1;
        });
      },

      init: function () {
        var self = this;
        this.cargando = true;

        Promise.all([
          db.recetas.orderBy('createdAt').reverse().toArray(),
          db.pacientes.orderBy('nombre').toArray(),
          db.medicamentos.orderBy('nombre').toArray()
        ]).then(function (results) {
          self.items = results[0];
          self.pacientes = results[1];
          self.medicamentos = results[2];
          mod.pacientes = results[1];
          mod.medicamentos = results[2];
          self.cargando = false;
        });

        mod.cargarDatos = function () {
          db.recetas.orderBy('createdAt').reverse().toArray().then(function (data) {
            self.items = data;
          });
        };
        mod.cargarCatalogos = function () {
          db.pacientes.orderBy('nombre').toArray().then(function (data) {
            self.pacientes = data;
            mod.pacientes = data;
          });
          db.medicamentos.orderBy('nombre').toArray().then(function (data) {
            self.medicamentos = data;
            mod.medicamentos = data;
          });
        };
      },

      getNombrePaciente: function (id) {
        return mod.getNombrePaciente(id);
      },

      descifrarDiag: function (diag) {
        if (!diag) return '---';
        var d = cryptoHelpers.decrypt(diag);
        return d || diag;
      },

      abrirForm: function (item) {
        mod.abrirForm(item);
      },

      eliminar: function (item) {
        mod.eliminar(item);
      },

      generarPDF: function (item) {
        mod.generarPDF(item);
      }
    };
  }
</script>
